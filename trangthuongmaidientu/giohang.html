<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>SpeedTech</title>
<style>
body { margin:0; font-family:Arial; background:#f5f5f5; }
header { background:#d70018; color:white; padding:10px; }
.header-top { display:flex; justify-content:space-between; font-size:13px; }
.search-box { margin-top:8px; }
.search-box input { width:100%; padding:10px; border-radius:20px; border:none; }
.banner { height:180px; background:url("https://images.unsplash.com/photo-1511707171634-5f897ff02aa9") center/cover; margin:10px; border-radius:10px; }
.services { display:flex; justify-content:space-around; background:white; margin:10px; padding:10px; border-radius:10px; text-align:center; }
.categories { display:flex; gap:10px; overflow-x:auto; margin:10px; }
.category { background:white; padding:10px; border-radius:10px; min-width:100px; text-align:center; }
.section-title { margin:10px; font-weight:bold; color:#d70018; }
.products { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:10px; padding:10px; margin-bottom:80px; }
.product { background:white; border-radius:10px; overflow:hidden; }
.product img { width:100%; height:140px; object-fit:cover; }
.product-info { padding:10px; }
.price { color:#d70018; font-weight:bold; }
.sale { position:absolute; top:5px; left:5px; background:red; color:white; padding:2px 5px; font-size:12px; border-radius:5px; }
button { width:100%; padding:6px; background:#d70018; color:white; border:none; border-radius:5px; cursor:pointer; }
.bottom-nav { position:fixed; bottom:0; width:100%; background:white; display:flex; justify-content:space-around; border-top:1px solid #ddd; padding:10px 0; }
</style>
</head>
<body>
<header>
  <div class="header-top">
    <span>📍 Hà Nội</span>
    <span>📞 1800 2097</span>
  </div>
  <div class="search-box">
    <input type="text" id="search" placeholder="Bạn cần tìm gì?">
  </div>
</header>

<div class="banner"></div>

<div class="services">
  <div>🚚<br>Giao nhanh</div>
  <div>💳<br>Trả góp</div>
  <div>🛡️<br>Bảo hành</div>
  <div>🎁<br>Ưu đãi</div>
</div>

<div class="categories">
  <div class="category">📱 Điện thoại</div>
  <div class="category">💻 Laptop</div>
  <div class="category">🎧 Tai nghe</div>
</div>

<h3 class="section-title">🔥 Sản phẩm nổi bật</h3>
<div class="products" id="products"></div>

<div class="bottom-nav">
  <div>🏠<br>Home</div>
  <div onclick="toggleCart()">🛒<br>Giỏ hàng</div>
</div>
<div class="bottom-nav">
  <div>📂<br>Danh mục</div>
  <div>🏬<br>Cửa hàng</div>
</div>
<div id="cartBox" style="display:none; position:fixed; right:10px; top:60px; width:300px; background:white; padding:10px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.2); max-height:400px; overflow:auto;">
  <h3>Giỏ hàng</h3>
  <div id="cartItems"></div>
  <p><b>Tổng: <span id="total">0</span>đ</b></p>
</div>
  <div>👤<br>Tài khoản</div>

<script>
const products = [
  {name:"iPhone 15", price:20000000, old:22000000, sale:"-10%", img:"https://www.apple.com/newsroom/images/2023/09/apple-unveils-iphone-15-pro-and-iphone-15-pro-max/article/Apple-iPhone-15-Pro-lineup-color-lineup-geo-230912_big.jpg.large_2x.jpg"},
  {name:"Samsung S23", price:18000000, old:20000000, sale:"-12%", img:"https://cdn2.cellphones.com.vn/insecure/rs:fill:0:358/q:90/plain/https://cellphones.com.vn/media/catalog/product/p/h/photo_2024-12-26_16-48-25_2.jpg"},
  {name:"Macbook Air", price:25000000, old:27000000, sale:"-8%", img:"https://cdni.dienthoaivui.com.vn/x420,webp,q100/https://dashboard.dienthoaivui.com.vn/uploads/wp-content/uploads/images/products/247478/thay-pin-macbook-pro-m2-max-2022-16%20inch-a2780-gen-a-nguyen-khung-17483278897349.jpg"},
  {name:"Tai nghe Sony", price:3000000, old:4000000, sale:"-25%", img:"https://hdradio.vn/upload/hinhanh/tai-nghe/Sony/wf-1000xm6/wf-1000xm6-avt.webp"},
  {name:"iphone 14 Pro", price:18000000, img:"https://www.apple.com/newsroom/images/product/iphone/standard/Apple-iPhone-14-Pro-iPhone-14-Pro-Max-space-black-220907_inline.jpg.large_2x.jpg"},
  {name:"iPad Pro", price:15000000, img:"https://store.storeimages.cdn-apple.com/1/as-images.apple.com/is/ipad-pro-finish-unselect-gallery-1-202405_FMT_WHH?wid=1280&hei=720&fmt=p-jpg&qlt=80&.v=YXpaUEtKWGhlNnNrVGZkTEo4T0xsN2dzSmpObkZCM3MrNmJ5SkhESlNDaUNOeTJ0NG53OUFoWllqZzhOc3p1UzN0bWR6ME9RYmIrVG9PSXZFalM2aHdBb0pjWml6bllCL0Y5a1RKc2gxZjlBcWhWSzMycEllY3d4RGgzS0xYcGJjSVB1SytHWEVJU1BQRDRHRFJtOWRR&traceId=1"},
  {name:"Apple Watch", price:8000000, img:"https://images.unsplash.com/photo-1516574187841-cb9cc2ca948b"},
  {name:"Laptop Dell XPS", price:22000000, img:"https://images.unsplash.com/photo-1496181133206-80ce9b88a853"},
  {name:"Chuột Gaming", price:500000, img:"https://store.storeimages.cdn-apple.com/1/as-images.apple.com/is/s11-case-unselect-gallery-1-202509_GEO_VN_FMT_WHH?wid=752&hei=720&fmt=p-jpg&qlt=80&.v=WldDSmZlQ1ladGVha0lMWUJJK2M4ZHlVRllKam5abHNZRGludXlMbytKNHJIb251TTNHZXFNNGtpZm1kN3hmRHdNcFdFNWZtdVQ0djE1UTRwRU5lcXlaSE1Qa0haZTFvMWVJTkxjaWwxSnlpeUlldENlcWUwU1RFbkFmYitxUFRwOU90TDlNMDBLdHFUaVVCQ0hiUGVR"},
  {name:"Bàn phím cơ", price:1200000, img:"https://images.unsplash.com/photo-1518770660439-4636190af475"},
  {name:"Xaiaomi 13", price:16000000, img:"https://i02.appmifile.com/158_operator_sg/08/02/2023/3436112edf5d104a191c22576c6506bf.png?f=webp"}
];


let cart = JSON.parse(localStorage.getItem("cart")) || [];

function render(list) {
  const container = document.getElementById("products");
  container.innerHTML = "";

  list.forEach(p => {
    container.innerHTML += `
      <div class="product">
        <img src="${p.img}">
        <div class="product-info">
          <h4>${p.name}</h4>
          <p class="price">${p.price.toLocaleString()}đ</p>
          <button onclick="addToCart('${p.name}')">Thêm</button>
        </div>
      </div>
    `;
  });
}

function addToCart(name) {
  const product = products.find(p => p.name === name);
  const exist = cart.find(i => i.name === name);

  if (exist) exist.quantity++;
  else cart.push({...product, quantity:1});

  localStorage.setItem("cart", JSON.stringify(cart));
  renderCart();
}

function renderCart() {
  const box = document.getElementById("cartItems");
  let total = 0;
  box.innerHTML = "";

  cart.forEach((item, index) => {
    total += item.price * item.quantity;

    box.innerHTML += `
      <div style="border-bottom:1px solid #ddd; margin-bottom:8px;">
        <b>${item.name}</b><br>
        ${item.price.toLocaleString()}đ<br>
        <button onclick="changeQty(${index},-1)">-</button>
        ${item.quantity}
        <button onclick="changeQty(${index},1)">+</button>
      </div>
    `;
  });

  document.getElementById("total").innerText = total.toLocaleString();
}

function changeQty(index, val) {
  cart[index].quantity += val;
  if (cart[index].quantity <= 0) cart.splice(index,1);
  localStorage.setItem("cart", JSON.stringify(cart));
  renderCart();
}

function toggleCart() {
  const box = document.getElementById("cartBox");
  box.style.display = box.style.display === "block" ? "none" : "block";
  renderCart();
}


document.getElementById("search").addEventListener("input", function(){
  const key = this.value.toLowerCase();
  render(products.filter(p => p.name.toLowerCase().includes(key)));
});

render(products);
</script>
</body>
</html>
