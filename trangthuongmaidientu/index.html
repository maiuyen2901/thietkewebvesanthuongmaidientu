<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>SpeedTech</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f5f5;
}

header {
  background: #d70018;
  color: white;
  padding: 12px;
  position: sticky;
  top: 0;
}

.search-box input {
  width: 100%;
  padding: 10px;
  border-radius: 20px;
  border: none;
  margin-top: 8px;
}

.banner {
  height: 220px;
  margin: 10px;
  border-radius: 12px;
  background: url("https://images.unsplash.com/photo-1511707171634-5f897ff02aa9") center/cover;
}

.services {
  display: grid;
  grid-template-columns: repeat(4,1fr);
  margin: 10px;
  background: white;
  border-radius: 12px;
  padding: 10px;
  text-align: center;
}

.categories {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  margin: 10px;
}

.category {
  background: white;
  padding: 10px;
  border-radius: 10px;
  min-width: 90px;
  text-align: center;
}

.section {
  margin: 10px;
  background: white;
  border-radius: 12px;
  padding: 10px;
}

.section-title {
  font-weight: bold;
  margin-bottom: 10px;
  color: #d70018;
}

.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px,1fr));
  gap: 12px;
}

.product {
  border-radius: 10px;
  overflow: hidden;
  background: #fff;
  transition: 0.3s;
  border: 1px solid #eee;
}

.product:hover {
  transform: translateY(-5px);
  box-shadow: 0 8px 20px rgba(0,0,0,0.15);
}

.product img {
  width: 100%;
  height: 150px;
  object-fit: cover;
}

.product-info {
  padding: 10px;
}

.price {
  color: #d70018;
  font-weight: bold;
}

.old-price {
  text-decoration: line-through;
  font-size: 12px;
  color: gray;
}

.sale {
  position: absolute;
  background: red;
  color: white;
  padding: 2px 6px;
  font-size: 12px;
  border-radius: 5px;
  top: 5px;
  left: 5px;
}

button {
  width: 100%;
  padding: 6px;
  background: #d70018;
  color: white;
  border: none;
  border-radius: 5px;
  margin-top: 5px;
}

/* NAV */
.bottom-nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  display: flex;
  justify-content: space-around;
  border-top: 1px solid #ddd;
  padding: 10px 0;
}

.products {
  margin-bottom: 80px;
}
</style>
</head>

<body>

<header>
  <div>📍 Hà Nội | 📞 1800 2097</div>
  <div class="search-box">
    <input type="text" id="search" placeholder="Bạn cần tìm gì?">
  </div>
</header>

<div class="banner"></div>

<div class="services">
  <div>🚚<br>Giao nhanh</div>
  <div>💳<br>Trả góp</div>
  <div>🛡️<br>Bảo hành</div>
  <div>🎁<br>Ưu đãi</div>
</div>

<div class="categories">
  <div class="category">📱 Điện thoại</div>
  <div class="category">💻 Laptop</div>
  <div class="category">🎧 Tai nghe</div>
  <div class="category">⌚ Đồng hồ</div>
  <div class="category">🖱️ Phụ kiện</div>
</div>

<div class="section">
  <div class="section-title">🔥 Flash Sale</div>
  <div class="products" id="products"></div>
</div>

<div class="section">
  <div class="section-title">⭐ Gợi ý cho bạn</div>
  <div class="products" id="suggest"></div>
</div>

<div class="bottom-nav">
  <div>🏠<br>Home</div>
  <div>📂<br>Danh mục</div>
  <div>🏬<br>Cửa hàng</div>
  <div>🛒<br>Giỏ hàng</div>
  <div>👤<br>Tài khoản</div>
</div>

function render(list, id) {
  const container = document.getElementById(id);
  container.innerHTML = "";

  list.forEach(p => {
    container.innerHTML += `
      <div class="product">
        <div style="position:relative">
          <img src="${p.img}">
          ${p.sale ? `<span class="sale">${p.sale}</span>` : ""}
        </div>
        <div class="product-info">
          <h4>${p.name}</h4>
          ${p.old ? `<span class="old-price">${p.old.toLocaleString()}đ</span>` : ""}
          <p class="price">${p.price.toLocaleString()}đ</p>
          <button onclick="alert('Đã thêm vào giỏ')">Thêm</button>
        </div>
      </div>
    `;
  });
}

</html>
