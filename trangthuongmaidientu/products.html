<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Danh mục sản phẩm</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f5f5;
}

header {
  background: #d70018;
  color: white;
  padding: 10px;
}

.search-box input {
  width: 100%;
  padding: 10px;
  border-radius: 20px;
  border: none;
}

.categories {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  margin: 10px;
}

.category {
  background: white;
  padding: 10px;
  border-radius: 10px;
  min-width: 100px;
  text-align: center;
  cursor: pointer;
}

.category.active {
  background: #d70018;
  color: white;
}

.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px,1fr));
  gap: 10px;
  padding: 10px;
}

.product {
  background: white;
  border-radius: 10px;
  overflow: hidden;
}

.product img {
  width: 100%;
  height: 140px;
  object-fit: cover;
}

.product-info {
  padding: 10px;
}

.price {
  color: #d70018;
  font-weight: bold;
}

.sale {
  position: absolute;
  top: 5px;
  left: 5px;
  background: red;
  color: white;
  padding: 2px 5px;
  font-size: 12px;
  border-radius: 5px;
}

button {
  width: 100%;
  padding: 6px;
  background: #d70018;
  color: white;
  border: none;
  border-radius: 5px;
}
</style>
</head>

<body>

<header>
  <input type="text" id="search" placeholder="Tìm sản phẩm...">
</header>

<!-- DANH MỤC -->
<div class="categories">
  <div class="category active" onclick="filterCategory('all', this)">Tất cả</div>
  <div class="category" onclick="filterCategory('phone', this)">📱 Điện thoại</div>
  <div class="category" onclick="filterCategory('laptop', this)">💻 Laptop</div>
  <div class="category" onclick="filterCategory('audio', this)">🎧 Tai nghe</div>
  <div class="category" onclick="filterCategory('accessory', this)">🖱️ Phụ kiện</div>
  <div class="category" onclick="filterCategory('watch', this)">⌚ Đồng hồ</div>
</div>

<!-- SẢN PHẨM -->
<div class="products" id="products"></div>

<script>
const products = [
  {name:"iPhone 15", price:20000000, category:"phone", sale:"-10%", img:"https://images.unsplash.com/photo-1511707171634-5f897ff02aa9"},
  {name:"iPhone 14 Pro", price:18000000, category:"phone", sale:"-15%", img:"https://images.unsplash.com/photo-1603899122634-f086ca5f5ddd"},
  {name:"Samsung S23", price:17000000, category:"phone", sale:"-12%", img:"https://images.unsplash.com/photo-1610945265064-0e34e5519bbf"},
  {name:"Xiaomi 13", price:12000000, category:"phone", sale:"-20%", img:"https://images.unsplash.com/photo-1580910051074-3eb694886505"},

  {name:"Macbook Air M2", price:25000000, category:"laptop", sale:"-8%", img:"https://images.unsplash.com/photo-1517336714731-489689fd1ca8"},
  {name:"Laptop Dell XPS", price:22000000, category:"laptop", sale:"-10%", img:"https://images.unsplash.com/photo-1496181133206-80ce9b88a853"},

  {name:"Tai nghe Sony", price:3000000, category:"audio", sale:"-25%", img:"https://images.unsplash.com/photo-1518441902112-fd1b6f9c7b1e"},
  {name:"AirPods Pro", price:5000000, category:"audio", sale:"-18%", img:"https://images.unsplash.com/photo-1585386959984-a41552231658"},

  {name:"Chuột Gaming", price:500000, category:"accessory", sale:"-30%", img:"https://images.unsplash.com/photo-1587202372775-9893b3cbe8c4"},
  {name:"Bàn phím cơ", price:1200000, category:"accessory", sale:"-20%", img:"https://images.unsplash.com/photo-1518770660439-4636190af475"},

  {name:"Apple Watch", price:8000000, category:"watch", sale:"-10%", img:"https://images.unsplash.com/photo-1516574187841-cb9cc2ca948b"},
  {name:"iPad Pro", price:15000000, category:"accessory", sale:"-12%", img:"https://images.unsplash.com/photo-1544244015-0df4b3ffc6b0"}
];

let currentCategory = "all";

function render(list) {
  const container = document.getElementById("products");
  container.innerHTML = "";

  list.forEach(p => {
    container.innerHTML += `
      <div class="product">
        <div style="position:relative">
          <img src="${p.img}">
          <span class="sale">${p.sale}</span>
        </div>
        <div class="product-info">
          <h4>${p.name}</h4>
          <p class="price">${p.price.toLocaleString()}đ</p>
          <button onclick="alert('Đã thêm vào giỏ')">Thêm</button>
        </div>
      </div>
    `;
  });
}

function filterCategory(category, el) {
  currentCategory = category;

  document.querySelectorAll(".category").forEach(c => c.classList.remove("active"));
  el.classList.add("active");

  applyFilter();
}

function applyFilter() {
  const key = document.getElementById("search").value.toLowerCase();

  const filtered = products.filter(p => {
    const matchName = p.name.toLowerCase().includes(key);
    const matchCategory = currentCategory === "all" || p.category === currentCategory;
    return matchName && matchCategory;
  });

  render(filtered);
}

document.getElementById("search").addEventListener("input", applyFilter);

render(products);
</script>

</body>
</html>
