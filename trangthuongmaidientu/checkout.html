<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Thanh toán</title>
<style>
body {font-family: Arial; margin:0; background:#f5f5f5;}
header {background:#d70018; color:#fff; padding:15px; text-align:center;}
.container {padding:15px;}
.card {background:#fff; border-radius:10px; padding:15px; margin-bottom:15px;}
input, select {
  width:100%; padding:10px; margin-top:8px;
  border-radius:5px; border:1px solid #ccc;
}
.product {display:flex; justify-content:space-between; margin-bottom:10px;}
.total {font-size:18px; font-weight:bold; color:#d70018;}
button {
  width:100%; padding:12px; background:#d70018;
  color:#fff; border:none; border-radius:8px; font-size:16px;
}
</style>
</head>

<body>
<header>Thanh toán đơn hàng</header>

<div class="container">

  <div class="card">
    <h3>Thông tin khách hàng</h3>
    <input placeholder="Họ và tên">
    <input placeholder="Số điện thoại">
    <input placeholder="Địa chỉ nhận hàng">
  </div>

  <div class="card">
    <h3>Phương thức thanh toán</h3>
    <select>
      <option>Thanh toán khi nhận hàng (COD)</option>
      <option>Chuyển khoản ngân hàng</option>
      <option>Ví điện tử (Momo, ZaloPay)</option>
    </select>
  </div>

  <div class="card">
    <h3>Sản phẩm</h3>
    <div id="cart"></div>
    <hr>
    <p class="total">Tổng: <span id="total"></span></p>
  </div>

  <button onclick="checkout()">Đặt hàng</button>

</div>

<script>
// giả lập giỏ hàng (có thể lấy từ localStorage sau)
const cart = [
  {name:"iPhone 15", price:20000000, qty:1},
  {name:"AirPods Pro", price:5000000, qty:1}
];

function renderCart() {
  const box = document.getElementById("cart");
  const totalEl = document.getElementById("total");
  let total = 0;

  box.innerHTML = "";

  cart.forEach(p => {
    total += p.price * p.qty;
    box.innerHTML += `
      <div class="product">
        <span>${p.name} x${p.qty}</span>
        <span>${(p.price*p.qty).toLocaleString()}đ</span>
      </div>
    `;
  });

  totalEl.innerText = total.toLocaleString() + "đ";
}

function checkout() {
  alert("Đặt hàng thành công! 🎉");
}

renderCart();
</script>

</body>
</html>
