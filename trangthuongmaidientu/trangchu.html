<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>SpeedTech</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f5f5;
}

header {
  background: #d70018;
  color: white;
  padding: 10px;
}

.header-top {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
}

.search-box {
  margin-top: 8px;
}

.search-box input {
  width: 100%;
  padding: 10px;
  border-radius: 20px;
  border: none;
}

.banner {
  height: 180px;
  background: url("https://images.unsplash.com/photo-1511707171634-5f897ff02aa9") center/cover;
  margin: 10px;
  border-radius: 10px;
}

.services {
  display: flex;
  justify-content: space-around;
  background: white;
  margin: 10px;
  padding: 10px;
  border-radius: 10px;
  text-align: center;
}

.categories {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  margin: 10px;
}

.category {
  background: white;
  padding: 10px;
  border-radius: 10px;
  min-width: 100px;
  text-align: center;
}

.section-title {
  margin: 10px;
  font-weight: bold;
  color: #d70018;
}

.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px,1fr));
  gap: 10px;
  padding: 10px;
  margin-bottom: 80px;
}

.product {
  background: white;
  border-radius: 10px;
  overflow: hidden;
  transition: 0.3s;
}

.product:hover {
  transform: translateY(-3px);
}

.product img {
  width: 100%;
  height: 140px;
  object-fit: cover;
}

.product-info {
  padding: 10px;
}

.price {
  color: #d70018;
  font-weight: bold;
}

.sale {
  position: absolute;
  top: 5px;
  left: 5px;
  background: red;
  color: white;
  padding: 2px 5px;
  font-size: 12px;
  border-radius: 5px;
}

button {
  width: 100%;
  padding: 6px;
  background: #d70018;
  color: white;
  border: none;
  border-radius: 5px;
}

.bottom-nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  display: flex;
  justify-content: space-around;
  border-top: 1px solid #ddd;
  padding: 10px 0;
}

.bottom-nav div {
  font-size: 12px;
  text-align: center;
}
</style>
</head>

<body>

<header>
  <div class="header-top">
    <span>📍 Hà Nội</span>
    <span>📞 1800 2097</span>
  </div>

  <div class="search-box">
    <input type="text" id="search" placeholder="Bạn cần tìm gì?">
  </div>
</header>

<div class="banner"></div>

<div class="services">
  <div>🚚<br>Giao nhanh</div>
  <div>💳<br>Trả góp</div>
  <div>🛡️<br>Bảo hành</div>
  <div>🎁<br>Ưu đãi</div>
</div>

<div class="categories">
  <div class="category">📱 Điện thoại</div>
  <div class="category">💻 Laptop</div>
  <div class="category">🎧 Tai nghe</div>
  <div class="category">⌚ Đồng hồ</div>
  <div class="category">🖱️ Phụ kiện</div>
</div>

<h3 class="section-title">🔥 Sản phẩm nổi bật</h3>

<div class="products" id="products"></div>

<div class="bottom-nav">
  <div>🏠<br>Trang chủ</div>
  <div>📂<br>Danh mục</div>
  <div>🏬<br>Cửa hàng</div>
  <div>🛒<br>Giỏ hàng</div>
  <div>👤<br>Tài khoản</div>
</div>

<script>
const products = [
  {name:"iPhone 15", price:20000000, sale:"-10%", img:"https://images.unsplash.com/photo-1511707171634-5f897ff02aa9"},
  {name:"iPhone 14 Pro", price:18000000, sale:"-15%", img:"https://images.unsplash.com/photo-1603899122634-f086ca5f5ddd"},
  {name:"Samsung S23", price:17000000, sale:"-12%", img:"https://images.unsplash.com/photo-1610945265064-0e34e5519bbf"},
  {name:"Xiaomi 13", price:12000000, sale:"-20%", img:"https://images.unsplash.com/photo-1580910051074-3eb694886505"},
  {name:"Macbook Air M2", price:25000000, sale:"-8%", img:"https://images.unsplash.com/photo-1517336714731-489689fd1ca8"},
  {name:"Laptop Dell XPS", price:22000000, sale:"-10%", img:"https://images.unsplash.com/photo-1496181133206-80ce9b88a853"},
  {name:"Tai nghe Sony", price:3000000, sale:"-25%", img:"https://images.unsplash.com/photo-1518441902112-fd1b6f9c7b1e"},
  {name:"AirPods Pro", price:5000000, sale:"-18%", img:"https://images.unsplash.com/photo-1585386959984-a41552231658"},
  {name:"Chuột Gaming", price:500000, sale:"-30%", img:"https://images.unsplash.com/photo-1587202372775-9893b3cbe8c4"},
  {name:"Bàn phím cơ", price:1200000, sale:"-20%", img:"https://images.unsplash.com/photo-1518770660439-4636190af475"},
  {name:"Apple Watch", price:8000000, sale:"-10%", img:"https://images.unsplash.com/photo-1516574187841-cb9cc2ca948b"},
  {name:"iPad Pro", price:15000000, sale:"-12%", img:"https://images.unsplash.com/photo-1544244015-0df4b3ffc6b0"}
];

function render(list) {
  const container = document.getElementById("products");
  container.innerHTML = "";

  list.forEach(p => {
    container.innerHTML += `
      <div class="product">
        <div style="position:relative">
          <img src="${p.img}">
          <span class="sale">${p.sale}</span>
        </div>
        <div class="product-info">
          <h4>${p.name}</h4>
          <p class="price">${p.price.toLocaleString()}đ</p>
          <button onclick="alert('Đã thêm vào giỏ')">Thêm</button>
        </div>
      </div>
    `;
  });
}

document.getElementById("search").addEventListener("input", function(){
  const key = this.value.toLowerCase();
  const filtered = products.filter(p =>
    p.name.toLowerCase().includes(key)
  );
  render(filtered);
});

render(products);
</script>

</body>
</html>
